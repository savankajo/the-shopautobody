  <!--
    FIX (Critical): GitHub Pages SPA routing handler.
    When 404.html redirects to /?/actual-path, this script reads that
    path from the URL and uses history.replaceState() to restore it
    BEFORE React mounts — so the correct route renders immediately.
    Must come BEFORE any other scripts.
    Source: https://github.com/rafgraph/spa-github-pages
  -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
